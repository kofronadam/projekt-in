<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inizio Search Scraper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2 tracking-tight">Google <span class="text-blue-600">Scraper</span></h1>
            <p class="text-slate-500">Praktický test pro Inizio.cz – vyhledávání v reálném čase.</p>
        </header>
        
        <div class="bg-white p-6 rounded-2xl shadow-xl shadow-slate-200/60 mb-8 border border-slate-100">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="query" placeholder="Co chcete na Googlu najít?" 
                       class="flex-1 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-lg"
                       onkeypress="if(event.key === 'Enter') search()">
                
                <button onclick="search()" class="bg-blue-600 text-white font-semibold px-8 py-4 rounded-xl hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200">
                    Vyhledat
                </button>
            </div>
        </div>

        <div id="actions" class="hidden flex justify-between items-center mb-6 px-2">
            <h2 class="text-lg font-semibold text-slate-700">Nalezené výsledky</h2>
            <button onclick="downloadResults()" class="flex items-center gap-2 bg-emerald-50 text-emerald-700 font-medium px-4 py-2 rounded-lg hover:bg-emerald-100 transition-colors border border-emerald-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Exportovat JSON
            </button>
        </div>

        <div id="loading" class="hidden flex flex-col items-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4"></div>
            <p class="text-slate-500 animate-pulse">Analyzuji výsledky Googlu...</p>
        </div>

        <div id="results" class="grid gap-4">
            <div class="text-center py-20 border-2 border-dashed border-slate-200 rounded-3xl">
                <p class="text-slate-400 font-medium">Zadejte klíčové slovo a začněte hledat</p>
            </div>
        </div>
    </div>

    <script>
        let lastResults = [];

        async function search() {
            const queryInput = document.getElementById('query');
            const resultsDiv = document.getElementById('results');
            const actionsDiv = document.getElementById('actions');
            const loadingDiv = document.getElementById('loading');

            if (!queryInput.value.trim()) return;

            // UI Reset
            resultsDiv.innerHTML = '';
            actionsDiv.classList.add('hidden');
            loadingDiv.classList.remove('hidden');

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(queryInput.value)}`);
                lastResults = await response.json();
                
                renderCards(lastResults);
                
                if (lastResults.length > 0) {
                    actionsDiv.classList.remove('hidden');
                }
            } catch (err) {
                resultsDiv.innerHTML = `<p class="text-center text-red-500 py-10">Chyba: Nepodařilo se spojit se serverem.</p>`;
            } finally {
                loadingDiv.classList.add('hidden');
            }
        }

        function renderCards(data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            
            if (data.length === 0) {
                resultsDiv.innerHTML = '<p class="text-center text-slate-500 py-10">Nebyly nalezeny žádné organické výsledky.</p>';
                return;
            }

            data.forEach((item, index) => {
                resultsDiv.innerHTML += `
                    <div class="bg-white p-6 rounded-xl border border-slate-100 hover:border-blue-200 hover:shadow-md transition-all group">
                        <div class="flex items-start gap-4">
                            <span class="bg-slate-50 text-slate-400 font-bold px-3 py-1 rounded-lg text-sm">${index + 1}</span>
                            <div class="flex-1">
                                <a href="${item.link}" target="_blank" class="text-blue-600 text-xl font-semibold hover:underline group-hover:text-blue-700 block mb-1">
                                    ${item.title}
                                </a>
                                <p class="text-slate-500 text-sm mb-2 break-all">${item.link}</p>
                                <p class="text-slate-700 leading-relaxed">${item.snippet || 'K tomuto výsledku není k dispozici žádný popisek.'}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function downloadResults() {
            const blob = new Blob([JSON.stringify(lastResults, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `google-results-${new Date().getTime()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
