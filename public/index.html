<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inizio Search Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-2xl">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Google Search Scraper</h1>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="query" placeholder="Zadejte klíčové slovo..." 
                   class="flex-1 p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="search()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">
                Hledat
            </button>
        </div>

        <button id="downloadBtn" onclick="downloadResults()" class="hidden mb-4 text-sm bg-green-600 text-white px-4 py-1 rounded hover:bg-green-700">
            Stáhnout jako JSON
        </button>

        <div id="results" class="space-y-4">
            </div>
    </div>

    <script>
        let lastResults = [];

        async function search() {
            const query = document.getElementById('query').value;
            const resultsDiv = document.getElementById('results');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!query) return alert('Napiš něco!');

            resultsDiv.innerHTML = '<p class="text-center text-gray-500">Vyhledávám...</p>';

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                lastResults = await response.json();
                
                displayResults(lastResults);
                downloadBtn.classList.remove('hidden');
            } catch (err) {
                resultsDiv.innerHTML = '<p class="text-red-500">Chyba při vyhledávání.</p>';
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            
            data.forEach(item => {
                resultsDiv.innerHTML += `
                    <div class="border-b pb-2">
                        <a href="${item.link}" target="_blank" class="text-blue-700 font-semibold hover:underline">${item.title}</a>
                        <p class="text-sm text-gray-600 leading-tight">${item.snippet}</p>
                    </div>
                `;
            });
        }

        function downloadResults() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(lastResults, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "vysledky_vyhledavani.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }
    </script>
</body>
</html>
